<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototipo Boton de Emergencia</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav class="barra-navegacion">
            <div class="logotipo">BOTON DE EMERGENCIA</div>
            <ul class="enlaces-nav">
                <li><a href="#">Inicio</a></li>
                <li><a href="#" class="boton-contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <section class="inicio">
        <div class="contenido-inicio">
            <h1>Prototipo</h1>
            <h2 class="resaltado">BOTÓN DE EMERGENCIA</h2>
            <p>Servicio publico para uso en caso de emergencias.</p>
            <a href="#" class="boton-principal">Saber más</a>
        </div>
    </section>

    <section class="seccion-servicios">
        <div class="contenedor-flexible">
            
            <div class="fila-superior">
                <div class="tarjeta-pequena">
                    <h4>Redes Sociales</h4>
                    <p>Actualizaciones diarias sobre el proyecto.</p>
                </div>

                <div class="tarjeta-pequena">
                    <h4>Prototipos</h4>
                    <p>Imagenes de los prototipos.</p>
                </div>
            </div>

            <div class="tarjeta-grande-mapa">
                <div class="envoltorio-imagen">
                    <img src="mapa.png" alt="Mapa de ubicación">
                    <div class="etiqueta-mapa">Ubicaciónes Principales</div>
                </div>
            </div>

        </div>
    </section>
</body>
</html>
